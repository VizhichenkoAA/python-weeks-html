x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    _PIP_ADDITIONAL_REQUIREMENTS: pandas pyyaml requests sqlalchemy psycopg2-binary python-dotenv
    TP_PROJECT_DIR: /opt/airflow/project
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./:/opt/airflow/project
    - airflow-logs:/opt/airflow/logs
  user: "50000:0"
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  airflow-db:
    image: postgres:16-alpine
    container_name: tp-v03-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: tp-v03-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username airflow --password airflow \
          --firstname TP --lastname Student --role Admin --email tp@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: tp-v03-airflow-web
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: tp-v03-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_db_data:
  airflow-logs:
