services:
  postgres:
    image: postgres:16-alpine
    container_name: tp-v03-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tp_user
      POSTGRES_PASSWORD: tp_pass
      POSTGRES_DB: tp_variant_03
    ports:
      - "5433:5432"
    volumes:
      - tp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tp_user -d tp_variant_03"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:latest
    container_name: tp-v03-metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - tp_metabase_data:/metabase-data

volumes:
  tp_pg_data:
  tp_metabase_data:
